<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>
<h2>Student Registration Form</h2>

  <form>

  Name:<br>
   <input type="text" name="name"><br><br>
   Email:<br>
 <input type="email" name="email"><br><br>
    Phone Number:<br>
<input type="tel" name="phone" id="phone" oninput="validatePhone(this)">
<p id="error-msg" style="color:red; font-size:12px; display:none;">
  Only 10 digits are allowed!
</p>
<br>
     Gender:<br>
    <input type="radio" name="gender"> Male
     <input type="radio" name="gender"> Female<br><br>
        Date of Birth:<br>
    <input type="date" name="dob"><br><br>

        Course:<br>
        <select name="course">
     <option>Science</option>
      <option>Commerce</option>
      <option>Arts</option>
        </select><br><br>
      Address:<br>
        <textarea name="address"></textarea><br><br>
 <input type="submit" value="Register">
        <input type="reset" value="Reset">

    </form>
<script>
function validatePhone(input) {
  const errorMsg = document.getElementById('error-msg');
  
  // If the length is greater than 10
  if (input.value.length > 10) {
    // Trim the value back to 10 digits
    input.value = input.value.slice(0, 10);
    // Show the error message
    errorMsg.style.display = 'block';
  } else {
    // Hide the error message if they are within limits
    errorMsg.style.display = 'none';
  }
}
</script>
</body>
</html>
