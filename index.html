<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Development Assignments | Aryan Belekar/title>
    <meta name="description" content="Assignment dashboard for Web Development course. Developed by Akshay Surgond.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: var(--primary-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Background shapes */
        .bg-shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
        }

        .shape1 {
            width: 450px;
            height: 450px;
            background: rgba(59, 130, 246, 0.3);
            top: -150px;
            left: -120px;
        }

        .shape2 {
            width: 450px;
            height: 450px;
            background: rgba(14, 165, 233, 0.3);
            bottom: -140px;
            right: -120px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        header h1 {
            font-size: 55px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        header p {
            font-size: 18px;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* SECTION TITLE */
        .section-title {
            font-size: 34px;
            margin: 50px 0 35px;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 70%;
            height: 4px;
            border-radius: 10px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            transition: width 0.3s ease;
        }

        section:hover .section-title::after {
            width: 100%;
        }

        /* GRID */
        .assignments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        /* CARD */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .card-header {
            padding: 30px 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .assignment-number {
            font-size: 42px;
            font-weight: 700;
            color: #a5b4fc;
            margin-bottom: 10px;
            line-height: 1;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
        }

        .card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .description {
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 20px;
            opacity: 0.8;
            flex-grow: 1;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tag {
            padding: 6px 14px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 12px;
            font-weight: 500;
        }

        /* BUTTON */
        .btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            background: var(--accent-gradient);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.4);
        }

        /* FOOTER */
        footer {
            margin-top: 80px;
            padding: 60px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
        }

        footer h3 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #a5b4fc;
        }

        footer p {
            margin: 8px 0;
            font-size: 15px;
            opacity: 0.8;
        }

        .github-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            background: var(--accent-gradient);
            font-weight: 600;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        .github-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 210, 255, 0.4);
        }

        @media(max-width:768px) {
            header h1 {
                font-size: 38px;
            }
            .section-title {
                font-size: 28px;
            }
            .assignments-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
