<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Development Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#0f172a;
    --card:rgba(255,255,255,0.07);
    --border:rgba(255,255,255,0.12);
    --primary:#38bdf8;
    --secondary:#8b5cf6;
    --text:#ffffff;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a,#111827);
    color:white;
    min-height:100vh;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,rgba(56,189,248,0.25),transparent 30%),
    radial-gradient(circle at bottom right,rgba(139,92,246,0.25),transparent 30%);
    z-index:-1;
}

header{
    width:100%;
    padding:18px 25px;
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(12px);

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.logo h1{
    color:var(--primary);
    font-size:28px;
}

.logo p{
    font-size:14px;
    opacity:0.8;
}

.student-info{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.info-box{
    background:var(--card);
    border:1px solid var(--border);
    padding:10px 16px;
    border-radius:12px;
    font-size:14px;
}

.main{
    display:flex;
    height:calc(100vh - 90px);
}

.sidebar{
    width:300px;
    background:rgba(255,255,255,0.04);
    border-right:1px solid var(--border);
    overflow-y:auto;
    padding:20px;
    transition:0.4s;
}

.sidebar h2{
    margin-bottom:20px;
    color:var(--primary);
}

.assignment-btn{
    width:100%;
    padding:15px;
    margin-bottom:14px;
    border:none;
    border-radius:14px;
    background:var(--card);
    color:white;
    cursor:pointer;
    text-align:left;
    border:1px solid transparent;
    transition:0.3s;
    font-size:15px;
}

.assignment-btn:hover{
    background:rgba(56,189,248,0.15);
    border-color:var(--primary);
    transform:translateX(5px);
}

.assignment-btn.active{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    font-weight:600;
}

.viewer{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.viewer-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

.viewer-top h2{
    color:var(--primary);
}

.live{
    background:rgba(34,197,94,0.15);
    color:#4ade80;
    padding:10px 16px;
    border-radius:30px;
    border:1px solid rgba(34,197,94,0.3);
    font-size:14px;
}

.preview-box{
    flex:1;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--border);
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}

.loader{
    position:absolute;
    inset:0;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:15px;
    z-index:10;
}

.spinner{
    width:55px;
    height:55px;
    border-radius:50%;
    border:5px solid rgba(255,255,255,0.1);
    border-top:5px solid var(--primary);
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.menu-btn{
    display:none;
    background:var(--card);
    color:white;
    border:none;
    padding:12px 16px;
    border-radius:12px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:12px;
    background:rgba(255,255,255,0.05);
    border-top:1px solid var(--border);
    font-size:14px;
}

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .main{
        flex-direction:column;
        height:auto;
    }

    .sidebar{
        width:100%;
        max-height:0;
        overflow:hidden;
    }

    .sidebar.show{
        max-height:1000px;
    }

    .menu-btn{
        display:block;
    }

    .viewer{
        height:85vh;
    }

}

</style>
</head>

<body>

</div>

<iframe id="frame"
src="https://aryanbelekar.github.io/S5_106_WebDevlopment/Assignment%201.html">

</div>

</div>

</div>

<footer>
© 2026 Aryan Belekar | Web Development Dashboard
</footer>

<script>

const frame=document.getElementById('frame');
const loader=document.getElementById('loader');
const title=document.getElementById('title');

function loadAssignment(file,btn){

    loader.style.display='flex';

    document.querySelectorAll('.assignment-btn').forEach(button=>{
        button.classList.remove('active');
    });

    btn.classList.add('active');

    frame.src=file;

    title.innerText=btn.innerText;

    frame.onload=function(){
        loader.style.display='none';
    }

}

function toggleMenu(){
    document.getElementById('sidebar').classList.toggle('show');
}

window.onload=function(){

    setTimeout(()=>{
        loader.style.display='none';
    },1000);

}

</script>

</html>
